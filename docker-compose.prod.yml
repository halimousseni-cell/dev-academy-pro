# Surcouche de production : ajoute le reverse proxy HTTPS (Nginx +
# Let's Encrypt via Certbot) devant le conteneur frontend, qui n'est plus
# exposé directement sur l'hôte.
#
# Utilisation :
#   cp .env.example .env   # renseigner DOMAIN et LETSENCRYPT_EMAIL en plus
#                           # des secrets habituels, COOKIE_SECURE=true et
#                           # FRONTEND_ORIGIN=https://<DOMAIN>
#   ./init-letsencrypt.sh  # une seule fois, pour obtenir le 1er certificat
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  # Le frontend n'est plus exposé directement : tout le trafic passe par le
  # reverse proxy `nginx` (TLS). Nécessite Docker Compose v2.24+ pour la
  # syntaxe `!reset` (sinon retirer cette clé et fermer le port 8080 au
  # niveau du pare-feu de l'hôte).
  frontend:
    ports: !reset []

  nginx:
    build: ./nginx
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - internal

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
