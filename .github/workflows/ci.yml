name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-backend:
    name: Lint & typecheck — backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm run prisma:generate
        working-directory: backend
      - run: npm run typecheck
        working-directory: backend

  lint-frontend:
    name: Lint & build — frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  sast-semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: p/default

  audit:
    name: Vulnerability audit — npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit backend dependencies
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high
      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: dev-academy-pro-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: dev-academy-pro-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build nginx reverse proxy image
        uses: docker/build-push-action@v6
        with:
          context: nginx
          push: false
          tags: dev-academy-pro-nginx:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build backup image
        uses: docker/build-push-action@v6
        with:
          context: backup
          push: false
          tags: dev-academy-pro-backup:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    name: Vulnerability scan — Trivy
    runs-on: ubuntu-latest
    needs: [build-images]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          load: true
          tags: dev-academy-pro-backend:ci
          cache-from: type=gha
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          load: true
          tags: dev-academy-pro-frontend:ci
          cache-from: type=gha
      - name: Build nginx reverse proxy image
        uses: docker/build-push-action@v6
        with:
          context: nginx
          push: false
          load: true
          tags: dev-academy-pro-nginx:ci
          cache-from: type=gha
      - name: Build backup image
        uses: docker/build-push-action@v6
        with:
          context: backup
          push: false
          load: true
          tags: dev-academy-pro-backup:ci
          cache-from: type=gha
      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dev-academy-pro-backend:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dev-academy-pro-frontend:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Scan nginx reverse proxy image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dev-academy-pro-nginx:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Scan backup image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: dev-academy-pro-backup:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
